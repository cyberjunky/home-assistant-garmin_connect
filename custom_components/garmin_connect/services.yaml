set_active_gear:
  name: Set active gear
  description: Set a gear item as the default for a specific activity type.
  fields:
    gear_uuid:
      name: Gear UUID
      description: UUID of the gear. Use either gear_uuid or entity_id.
      example: "abc123-def456"
      selector:
        text:
    entity_id:
      name: Gear entity
      description: Entity ID of the gear sensor. Use either entity_id or gear_uuid.
      selector:
        entity:
          integration: garmin_connect
    activity_type:
      name: Activity type
      description: The activity type to assign the gear to.
      required: true
      selector:
        select:
          options:
            - running
            - cycling
            - hiking
            - walking
            - swimming
            - other
    setting:
      name: Setting
      description: How to apply the gear assignment.
      selector:
        select:
          options:
            - "set this as default, unset others"
            - "set as default"
            - "unset default"

add_body_composition:
  name: Add body composition
  description: Upload a body composition measurement to Garmin Connect.
  fields:
    entity_id:
      name: Garmin Connect entity
      description: Optional Garmin Connect entity whose account should receive the measurement.
      selector:
        entity:
          integration: garmin_connect
    weight:
      name: Weight (kg)
      description: Body weight in kilograms.
      required: true
      selector:
        number:
          min: 0
          max: 300
          step: 0.1
          unit_of_measurement: kg
    timestamp:
      name: Timestamp
      description: When the measurement was recorded (defaults to now).
      selector:
        text:
    bmi:
      name: BMI
      selector:
        number:
    percent_fat:
      name: Body fat percentage
      selector:
        number:
    percent_hydration:
      name: Hydration percentage
      selector:
        number:
    visceral_fat_mass:
      name: Visceral fat mass
      selector:
        number:
    bone_mass:
      name: Bone mass
      selector:
        number:
    muscle_mass:
      name: Muscle mass
      selector:
        number:
    basal_met:
      name: Basal metabolism
      selector:
        number:
    active_met:
      name: Active metabolism
      selector:
        number:
    physique_rating:
      name: Physique rating
      selector:
        number:
    metabolic_age:
      name: Metabolic age
      selector:
        number:
    visceral_fat_rating:
      name: Visceral fat rating
      selector:
        number:

create_activity:
  name: Create activity
  description: Create a manual activity in Garmin Connect.
  fields:
    activity_name:
      name: Activity name
      required: true
      selector:
        text:
    activity_type:
      name: Activity type
      required: true
      selector:
        select:
          options:
            - running
            - cycling
            - walking
            - hiking
            - swimming
            - fitness_equipment
            - other
    start_datetime:
      name: Start time
      description: "Start time (ISO 8601). Defaults to now."
      example: "2024-01-15T08:30:00"
      selector:
        text:
    duration_min:
      name: Duration (minutes)
      required: true
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: min
    distance_km:
      name: Distance (km)
      selector:
        number:
          min: 0
          max: 1000
          step: 0.01
          unit_of_measurement: km
    time_zone:
      name: Time zone
      description: "IANA time zone (e.g. Europe/Amsterdam). Defaults to HA time zone."
      example: "Europe/Amsterdam"
      selector:
        text:

upload_activity:
  name: Upload activity
  description: Upload a FIT/GPX/TCX activity file to Garmin Connect.
  fields:
    file_path:
      name: File path
      description: Absolute path to the activity file on the HA host.
      required: true
      example: "/config/activities/run.fit"
      selector:
        text:

add_hydration:
  name: Add hydration
  description: Log a hydration intake (or deduction) to Garmin Connect.
  fields:
    value_in_ml:
      name: Amount (mL)
      description: Hydration amount in millilitres. Use a negative value to subtract from today's intake.
      required: true
      selector:
        number:
          min: -5000
          max: 5000
          step: 1
          unit_of_measurement: mL
    timestamp:
      name: Timestamp
      description: "Measurement time (ISO 8601). Defaults to now."
      example: "2024-01-15T08:30:00"
      selector:
        text:

add_gear_to_activity:
  name: Add gear to activity
  description: Link a gear item to an existing Garmin Connect activity.
  fields:
    activity_id:
      name: Activity ID
      required: true
      selector:
        number:
          min: 1
          step: 1
    gear_uuid:
      name: Gear UUID
      description: UUID of the gear. Use either gear_uuid or entity_id.
      example: "abc123-def456"
      selector:
        text:
    entity_id:
      name: Gear entity
      description: Entity ID of the gear sensor. Use either entity_id or gear_uuid.
      selector:
        entity:
          integration: garmin_connect
